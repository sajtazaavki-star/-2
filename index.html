<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вязалочка PRO — Исправленная версия</title>
    
    <!-- Подключение библиотек -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap');
        body { 
            background-color: #fff1f2; 
            font-family: 'Nunito', sans-serif; 
            overscroll-behavior: none;
            touch-action: manipulation;
        }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .mic-active {
            animation: pulse-red 1.5s infinite;
            background-color: #f43f5e !important;
            color: white !important;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }
        .timer-blink {
            animation: blink 2s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        ::-webkit-scrollbar { width: 0px; }
        .card-enter {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #e11d48;">
            <div style="width: 40px; height: 40px; border: 4px solid #fecdd3; border-top-color: #e11d48; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 15px; font-weight: bold;">Загрузка мастерской...</p>
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection, query, deleteDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icons = {
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Mic: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Play: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Pause: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        };

        const CATEGORIES = [
            { id: 'socks', label: 'Носки', icon: '🧦' },
            { id: 'hats', label: 'Шапки', icon: '🧶' },
            { id: 'clothing', label: 'Одежда', icon: '🧥' },
            { id: 'other', label: 'Разное', icon: '✨' },
        ];

        const formatTime = (s) => {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${h > 0 ? h + ':' : ''}${m < 10 && h > 0 ? '0' + m : m}:${sec < 10 ? '0' + sec : sec}`;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [feedback, setFeedback] = useState('');
            const [isReady, setIsReady] = useState(false);
            
            const recognitionRef = useRef(null);
            const projectsRef = useRef([]); 
            const isListeningRef = useRef(false);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'knit-pro-v6-stable';
            
            useEffect(() => {
                if (!window.FB) return;
                const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FB;
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);

                const performAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                performAuth();

                return onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setIsReady(true);
                    }
                });
            }, []);

            useEffect(() => { projectsRef.current = projects; }, [projects]);
            useEffect(() => { isListeningRef.current = isListening; }, [isListening]);

            useEffect(() => {
                if (!user || !isReady) return;
                const { getFirestore, collection, query, onSnapshot } = window.FB;
                const db = getFirestore();
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'projects'));
                
                return onSnapshot(q, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                }, (err) => console.error("Firestore Error:", err));
            }, [user, isReady]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setProjects(prev => prev.map(p => {
                        if (p.isTimerRunning && p.status === 'active') {
                            return { ...p, timeSpent: (p.timeSpent || 0) + 1 };
                        }
                        return p;
                    }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // Стабильная функция сохранения
            const save = useCallback(async (id, data) => {
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FB;
                await setDoc(doc(getFirestore(), 'artifacts', appId, 'users', user.uid, 'projects', String(id)), data, { merge: true });
            }, [user, appId]);

            // Стабильная функция обновления счета
            const triggerUpdateCount = useCallback((pid, cid, delta) => {
                const p = projectsRef.current.find(x => x.id === pid);
                if (!p) return;
                const newC = p.counters.map(c => {
                    if (c.id === cid) {
                        const val = Math.max(0, c.count + delta);
                        if (delta > 0 && val % 10 === 0 && val !== 0) confetti({ particleCount: 30, origin: { y: 0.8 } });
                        return { ...c, count: val };
                    }
                    return c;
                });
                save(pid, { counters: newC });
            }, [save]);

            // Голосовой движок с использованием refs для обхода замыканий
            useEffect(() => {
                if (!('webkitSpeechRecognition' in window)) return;
                
                const rec = new window.webkitSpeechRecognition();
                rec.continuous = true;
                rec.interimResults = false;
                rec.lang = 'ru-RU';

                rec.onresult = (e) => {
                    const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
                    const keywords = ['дальше', 'плюс', 'ряд', 'еще', 'ещё', 'добавь', 'добавить'];
                    
                    if (keywords.some(k => transcript.includes(k))) {
                        // Всегда берем самый свежий массив проектов из ref
                        const activeProject = projectsRef.current.find(p => p.status === 'active');
                        if (activeProject) {
                            const lastCounter = activeProject.counters[activeProject.counters.length - 1];
                            // Вызываем функцию обновления
                            triggerUpdateCount(activeProject.id, lastCounter.id, 1);
                            
                            setFeedback('+1 ряд!');
                            setTimeout(() => setFeedback(''), 1500);
                        }
                    }
                };

                rec.onend = () => {
                    if (isListeningRef.current) {
                        try { rec.start(); } catch(err) {}
                    }
                };

                recognitionRef.current = rec;
            }, [triggerUpdateCount]);

            const toggleMic = () => {
                if (!recognitionRef.current) return;
                if (isListening) {
                    recognitionRef.current.stop();
                    setIsListening(false);
                } else {
                    recognitionRef.current.start();
                    setIsListening(true);
                }
            };

            const addProject = (name, cat) => {
                const id = Date.now();
                save(id, {
                    name, category: cat, status: 'active', createdAt: id,
                    timeSpent: 0, isTimerRunning: false,
                    counters: [{ id: Date.now(), name: 'Основной', count: 0, notes: '' }]
                });
                setIsModalOpen(false);
            };

            const addPart = (pid, name) => {
                const p = projects.find(x => x.id === pid);
                if (!p || !name) return;
                save(pid, { counters: [...p.counters, { id: Date.now(), name, count: 0, notes: '' }] });
            };

            const deleteP = (pid) => {
                if (confirm("Удалить проект навсегда?")) {
                    const { getFirestore, doc, deleteDoc } = window.FB;
                    deleteDoc(doc(getFirestore(), 'artifacts', appId, 'users', user.uid, 'projects', String(pid)));
                }
            };

            if (!isReady) return null;

            return (
                <div className="min-h-screen max-w-md mx-auto flex flex-col bg-rose-50/20">
                    <header className="sticky top-0 z-50 glass p-4 border-b border-rose-100 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="text-2xl">🧶</div>
                            <div>
                                <h1 className="text-xl font-black text-rose-600 tracking-tight leading-none">Вязалочка PRO</h1>
                                <div className="flex items-center gap-1 text-[9px] font-bold text-rose-400 uppercase tracking-widest mt-1">
                                    <div className="w-1.5 h-1.5 rounded-full bg-green-400"></div>
                                    Облако активно
                                </div>
                            </div>
                        </div>
                        <button onClick={toggleMic} className={`p-4 rounded-full transition-all duration-300 ${isListening ? 'mic-active' : 'bg-white text-rose-300 border border-rose-100 shadow-sm'}`}>
                            <Icons.Mic />
                        </button>
                    </header>

                    {feedback && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-rose-600 text-white px-8 py-3 rounded-full font-black text-lg animate-bounce shadow-2xl ring-4 ring-rose-200">
                            {feedback}
                        </div>
                    )}

                    <main className="p-4 space-y-6 pb-28">
                        {projects.length === 0 && (
                            <div className="text-center py-24 opacity-30">
                                <div className="text-7xl mb-4">🧶</div>
                                <p className="font-bold text-rose-900">Мастерская пуста</p>
                                <p className="text-xs mt-1">Нажмите +, чтобы начать</p>
                            </div>
                        )}

                        {projects.map(p => (
                            <div key={p.id} className="card-enter bg-white rounded-[40px] overflow-hidden shadow-xl shadow-rose-200/20 border-2 border-rose-50">
                                <div className="p-6 bg-rose-50/40 flex justify-between items-start">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-[10px] font-black bg-white text-rose-500 px-3 py-1 rounded-full border border-rose-100 uppercase tracking-wider">
                                                {CATEGORIES.find(c => c.id === p.category)?.label || 'Вязание'}
                                            </span>
                                            <button onClick={() => save(p.id, { isTimerRunning: !p.isTimerRunning, timeSpent: p.timeSpent || 0 })} className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-black border transition-all ${p.isTimerRunning ? 'bg-rose-500 text-white border-rose-500 timer-blink' : 'bg-white text-gray-400 border-gray-100 shadow-sm'}`}>
                                                {p.isTimerRunning ? <Icons.Pause /> : <Icons.Play />}
                                                {formatTime(p.timeSpent || 0)}
                                            </button>
                                        </div>
                                        <h2 className="text-2xl font-black text-gray-800 leading-tight tracking-tight">{p.name}</h2>
                                    </div>
                                    <button onClick={() => deleteP(p.id)} className="text-rose-100 hover:text-rose-500 p-2 transition-colors"><Icons.Trash /></button>
                                </div>

                                <div className="p-6 space-y-5">
                                    {p.counters.map(c => (
                                        <div key={c.id} className="bg-gray-50/80 rounded-3xl p-5 border border-gray-100">
                                            <div className="flex justify-between items-center mb-4">
                                                <p className="text-[11px] font-black text-gray-400 uppercase tracking-widest">{c.name}</p>
                                                <div className="text-5xl font-black text-rose-600 tabular-nums">{c.count}</div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => triggerUpdateCount(p.id, c.id, -1)} className="w-14 h-14 bg-white rounded-2xl border border-gray-100 text-gray-400 font-bold active:bg-gray-100 transition shadow-sm text-2xl flex items-center justify-center">−</button>
                                                <button onClick={() => triggerUpdateCount(p.id, c.id, 2)} className="flex-1 h-14 bg-rose-100 text-rose-600 rounded-2xl font-black text-xs border-2 border-rose-200 active:scale-95 transition tracking-widest uppercase">Плюс 2 ряда</button>
                                                <button onClick={() => triggerUpdateCount(p.id, c.id, 1)} className="w-16 h-14 bg-rose-600 text-white rounded-2xl font-bold flex items-center justify-center active:scale-95 transition shadow-lg shadow-rose-200">
                                                    <Icons.Plus />
                                                </button>
                                            </div>
                                        </div>
                                    ))}

                                    <div className="flex gap-2 pt-2">
                                        <input 
                                            id={`add-part-${p.id}`}
                                            className="flex-1 bg-white border-2 border-gray-100 rounded-2xl px-4 py-3 text-sm outline-none focus:border-rose-300 font-bold transition-all"
                                            placeholder="Добавить часть (Пятка...)"
                                        />
                                        <button 
                                            onClick={() => {
                                                const el = document.getElementById(`add-part-${p.id}`);
                                                if(el.value) { addPart(p.id, el.value); el.value = ''; }
                                            }}
                                            className="bg-gray-800 text-white px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black transition active:scale-95"
                                        >
                                            + Часть
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 w-16 h-16 bg-rose-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-40 border-4 border-white">
                        <Icons.Plus />
                    </button>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-rose-950/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl animate-slide-up">
                                <h2 className="text-2xl font-black text-gray-800 mb-6 flex items-center gap-2">Новый проект 🧶</h2>
                                <input id="p-name" className="w-full bg-gray-50 border-2 border-gray-100 focus:border-rose-500 rounded-3xl p-5 mb-4 outline-none font-black text-lg transition-all" placeholder="Название..." autoFocus />
                                <div className="grid grid-cols-2 gap-2 mb-8">
                                    {CATEGORIES.map(c => (
                                        <button key={c.id} onClick={() => window._sc = c.id} className="p-4 rounded-3xl border-2 border-gray-100 focus:border-rose-500 focus:bg-rose-50 text-sm font-black transition flex items-center justify-center gap-2">
                                            {c.icon} {c.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 font-black text-gray-400 uppercase text-xs tracking-widest">Отмена</button>
                                    <button onClick={() => {
                                        const n = document.getElementById('p-name').value;
                                        if(n) addProject(n, window._sc || 'other');
                                    }} className="flex-1 py-4 bg-rose-600 text-white rounded-3xl font-black shadow-lg shadow-rose-200 uppercase text-xs tracking-widest">Создать</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
