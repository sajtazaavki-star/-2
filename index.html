```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вязалочка PRO</title>
    
    <!-- Подключение библиотек -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #fff1f2; 
            font-family: 'Nunito', sans-serif; 
            touch-action: manipulation;
            overscroll-behavior: none;
            margin: 0;
            padding: 0;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
        }

        .mic-active {
            animation: pulse-rose 1.5s infinite;
            background-color: #e11d48 !important;
            color: white !important;
        }

        @keyframes pulse-rose {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }

        .timer-blink { animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        ::-webkit-scrollbar { width: 0px; }

        .card-enter {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Стиль для плашки "+1 ряд" */
        .feedback-pop {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: #e11d48;
            color: white;
            padding: 12px 30px;
            border-radius: 99px;
            font-weight: 900;
            font-size: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(225, 29, 72, 0.4);
            animation: popBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popBounce {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icons = {
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Mic: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Play: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Pause: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        };

        const CATEGORIES = [
            { id: 'socks', label: 'Носки', icon: '🧦' },
            { id: 'hats', label: 'Шапки', icon: '🧶' },
            { id: 'clothing', label: 'Одежда', icon: '🧥' },
            { id: 'other', label: 'Разное', icon: '✨' },
        ];

        const App = () => {
            // Загрузка данных из локальной памяти телефона
            const [projects, setProjects] = useState(() => {
                const saved = localStorage.getItem('knitting_pro_data');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [feedback, setFeedback] = useState('');
            
            const recognitionRef = useRef(null);
            const projectsRef = useRef(projects);
            const isListeningRef = useRef(isListening);

            // Синхронизируем Ref с состоянием для голосовых команд
            useEffect(() => { projectsRef.current = projects; }, [projects]);
            useEffect(() => { isListeningRef.current = isListening; }, [isListening]);

            // Сохранение в память при каждом изменении
            useEffect(() => {
                localStorage.setItem('knitting_pro_data', JSON.stringify(projects));
            }, [projects]);

            // Логика таймера
            useEffect(() => {
                const timer = setInterval(() => {
                    setProjects(prev => prev.map(p => {
                        if (p.isTimerRunning) {
                            return { ...p, timeSpent: (p.timeSpent || 0) + 1 };
                        }
                        return p;
                    }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // Инициализация голоса
            useEffect(() => {
                if (!('webkitSpeechRecognition' in window)) return;
                
                const rec = new window.webkitSpeechRecognition();
                rec.continuous = true;
                rec.interimResults = false;
                rec.lang = 'ru-RU';

                rec.onresult = (e) => {
                    const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
                    const keywords = ['дальше', 'плюс', 'ряд', 'еще', 'ещё', 'добавь', 'добавить'];
                    
                    if (keywords.some(k => transcript.includes(k))) {
                        // Находим самый первый активный проект
                        const active = projectsRef.current.find(p => !p.isFinished);
                        if (active) {
                            const lastCounterId = active.counters[active.counters.length - 1].id;
                            updateCount(active.id, lastCounterId, 1);
                            setFeedback('+1 ряд!');
                            setTimeout(() => setFeedback(''), 1500);
                        }
                    }
                };

                rec.onend = () => {
                    if (isListeningRef.current) {
                        try { rec.start(); } catch(err) {}
                    }
                };

                recognitionRef.current = rec;
            }, []);

            const toggleMic = () => {
                if (!recognitionRef.current) return;
                if (isListening) {
                    recognitionRef.current.stop();
                    setIsListening(false);
                } else {
                    recognitionRef.current.start();
                    setIsListening(true);
                }
            };

            const updateCount = (projId, counterId, delta) => {
                setProjects(prev => prev.map(p => {
                    if (p.id === projId) {
                        const newCounters = p.counters.map(c => {
                            if (c.id === counterId) {
                                const newVal = Math.max(0, c.count + delta);
                                if (delta > 0 && newVal % 10 === 0 && newVal !== 0) confetti({ particleCount: 30, origin: { y: 0.8 } });
                                return { ...c, count: newVal };
                            }
                            return c;
                        });
                        return { ...p, counters: newCounters };
                    }
                    return p;
                }));
            };

            const addProject = (name, cat) => {
                const newProj = {
                    id: Date.now(),
                    name,
                    category: cat,
                    createdAt: Date.now(),
                    timeSpent: 0,
                    isTimerRunning: false,
                    isFinished: false,
                    counters: [{ id: Date.now(), name: 'Основной', count: 0 }]
                };
                setProjects([newProj, ...projects]);
                setIsModalOpen(false);
            };

            const addPart = (projId, partName) => {
                if (!partName) return;
                setProjects(prev => prev.map(p => {
                    if (p.id === projId) {
                        return { ...p, counters: [...p.counters, { id: Date.now(), name: partName, count: 0 }] };
                    }
                    return p;
                }));
            };

            const toggleTimer = (projId) => {
                setProjects(prev => prev.map(p => 
                    p.id === projId ? { ...p, isTimerRunning: !p.isTimerRunning } : p
                ));
            };

            const deleteProj = (id) => {
                if (confirm("Удалить проект навсегда?")) {
                    setProjects(projects.filter(p => p.id !== id));
                }
            };

            const formatTime = (s) => {
                const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
                return `${h > 0 ? h + ':' : ''}${m < 10 && h > 0 ? '0' + m : m}:${sec < 10 ? '0' + sec : sec}`;
            };

            return (
                <div className="min-h-screen max-w-md mx-auto flex flex-col pb-24">
                    
                    {/* Header */}
                    <header className="sticky top-0 z-50 glass p-5 flex justify-between items-center border-b border-rose-100 shadow-sm">
                        <div className="flex items-center gap-3">
                            <span className="text-2xl">🧶</span>
                            <div>
                                <h1 className="text-xl font-black text-rose-600 tracking-tighter leading-none">Вязалочка PRO</h1>
                                <p className="text-[10px] font-bold text-rose-300 uppercase mt-1 tracking-widest flex items-center gap-1">
                                    <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Offline Mode
                                </p>
                            </div>
                        </div>
                        <button 
                            onClick={toggleMic} 
                            className={`p-4 rounded-full transition-all duration-300 ${isListening ? 'mic-active' : 'bg-white text-rose-300 border border-rose-100 shadow-sm'}`}
                        >
                            <Icons.Mic />
                        </button>
                    </header>

                    {feedback && <div className="feedback-pop">{feedback}</div>}

                    {/* Main Content */}
                    <main className="p-4 space-y-6">
                        {projects.length === 0 && (
                            <div className="text-center py-24 opacity-30">
                                <div className="text-7xl mb-4">🧶</div>
                                <p className="font-bold text-rose-900">Мастерская пуста</p>
                                <p className="text-sm">Нажмите +, чтобы начать</p>
                            </div>
                        )}

                        {projects.map(p => (
                            <div key={p.id} className="card-enter bg-white rounded-[40px] overflow-hidden shadow-xl shadow-rose-200/20 border-2 border-rose-50">
                                <div className="p-6 bg-rose-50/40 flex justify-between items-start">
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-[10px] font-black bg-white text-rose-500 px-3 py-1 rounded-full border border-rose-100 uppercase">
                                                {CATEGORIES.find(c => c.id === p.category)?.label || 'Вязание'}
                                            </span>
                                            <button 
                                                onClick={() => toggleTimer(p.id)} 
                                                className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-black border transition-all ${p.isTimerRunning ? 'bg-rose-500 text-white border-rose-500 timer-blink' : 'bg-white text-gray-400 border-gray-100 shadow-sm'}`}
                                            >
                                                {p.isTimerRunning ? <Icons.Pause /> : <Icons.Play />}
                                                {formatTime(p.timeSpent || 0)}
                                            </button>
                                        </div>
                                        <h2 className="text-2xl font-black text-gray-800 leading-tight tracking-tight">{p.name}</h2>
                                    </div>
                                    <button onClick={() => deleteProj(p.id)} className="text-rose-100 p-2"><Icons.Trash /></button>
                                </div>

                                <div className="p-6 space-y-5">
                                    {p.counters.map(c => (
                                        <div key={c.id} className="bg-gray-50/80 rounded-3xl p-5 border border-gray-100">
                                            <div className="flex justify-between items-center mb-4">
                                                <p className="text-[11px] font-black text-gray-400 uppercase tracking-widest">{c.name}</p>
                                                <div className="text-5xl font-black text-rose-600 tabular-nums">{c.count}</div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => updateCount(p.id, c.id, -1)} className="w-14 h-14 bg-white rounded-2xl border border-gray-100 text-gray-400 font-bold active:bg-gray-100 transition shadow-sm text-2xl flex items-center justify-center">−</button>
                                                <button onClick={() => updateCount(p.id, c.id, 2)} className="flex-1 h-14 bg-rose-100 text-rose-600 rounded-2xl font-black text-[10px] border-2 border-rose-200 active:scale-95 transition uppercase tracking-widest">Плюс 2 ряда</button>
                                                <button onClick={() => updateCount(p.id, c.id, 1)} className="w-16 h-14 bg-rose-600 text-white rounded-2xl font-bold flex items-center justify-center active:scale-95 transition shadow-lg shadow-rose-200">
                                                    <Icons.Plus />
                                                </button>
                                            </div>
                                        </div>
                                    ))}

                                    <div className="flex gap-2 pt-2">
                                        <input 
                                            id={`add-in-${p.id}`}
                                            className="flex-1 bg-white border-2 border-gray-100 rounded-2xl px-4 py-3 text-sm outline-none focus:border-rose-300 font-bold transition-all"
                                            placeholder="Добавить часть (Пятка...)"
                                        />
                                        <button 
                                            onClick={() => {
                                                const el = document.getElementById(`add-in-${p.id}`);
                                                if(el.value) { addPart(p.id, el.value); el.value = ''; }
                                            }}
                                            className="bg-gray-800 text-white px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black transition active:scale-95"
                                        >
                                            + Часть
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* Floating Add Button */}
                    <button 
                        onClick={() => setIsModalOpen(true)}
                        className="fixed bottom-8 right-8 w-16 h-16 bg-rose-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-40 border-4 border-white"
                    >
                        <Icons.Plus />
                    </button>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-rose-950/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <h2 className="text-2xl font-black text-gray-800 mb-6 flex items-center gap-2">Новый проект 🧶</h2>
                                <input id="p-name-in" className="w-full bg-gray-50 border-2 border-gray-100 focus:border-rose-500 rounded-3xl p-5 mb-4 outline-none font-black text-lg" placeholder="Название..." autoFocus />
                                <div className="grid grid-cols-2 gap-2 mb-8">
                                    {CATEGORIES.map(c => (
                                        <button key={c.id} onClick={() => window._cat = c.id} className="p-4 rounded-3xl border-2 border-gray-100 focus:border-rose-500 focus:bg-rose-50 text-sm font-black transition flex items-center justify-center gap-2">
                                            {c.icon} {c.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 font-black text-gray-400 uppercase text-xs">Отмена</button>
                                    <button onClick={() => {
                                        const val = document.getElementById('p-name-in').value;
                                        if(val) addProject(val, window._cat || 'other');
                                    }} className="flex-1 py-4 bg-rose-600 text-white rounded-3xl font-black shadow-lg shadow-rose-200 uppercase text-xs tracking-widest">Создать</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
